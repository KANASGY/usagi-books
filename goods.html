<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>うさぎブックス ― グッズ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --white:#FFFFFF; --paper:#F0F8F5; --ink:#2E4038; --ink-soft:#5C7268;
    --pink:#4CA36B; --water:#4AA3C4; --line:#D6E8E0;
    --shadow-sm:0 1px 2px rgba(23,27,24,0.06), 0 2px 8px rgba(23,27,24,0.04);
    --shadow-md:0 8px 24px rgba(23,27,24,0.08);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--white);color:var(--ink);font-family:'Zen Maru Gothic',sans-serif;line-height:1.75;}
  .wrap{max-width:1120px;margin:0 auto;padding:0 32px;}
  nav{position:sticky;top:0;z-index:10;background:rgba(255,255,255,0.9);border-bottom:1px solid var(--line);backdrop-filter:blur(6px);}
  .nav-inner{max-width:1120px;margin:0 auto;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
  .nav-logo{display:flex;align-items:center;gap:10px;}
  .back-link{font-size:13px;color:var(--ink-soft);text-decoration:none;font-weight:700;}

  .hero{padding:56px 0 40px;text-align:center;}
  .hero .tag{display:inline-block;font-size:12px;font-weight:700;letter-spacing:0.14em;color:var(--pink);background:#F7EBDF;border-radius:100px;padding:6px 16px;margin-bottom:20px;}
  .hero h1{font-size:34px;font-weight:900;letter-spacing:-0.01em;margin:0 0 14px;}
  .hero p{font-size:14.5px;color:var(--ink-soft);max-width:480px;margin:0 auto;}

  .poster-wrap{padding:0 0 90px;}
  .poster-frame{background:var(--paper);border:1px solid var(--line);border-radius:30px;padding:20px;box-shadow:var(--shadow-sm);}
  .poster-frame img{width:100%;height:auto;display:block;border-radius:16px;cursor:zoom-in;}
  .hint{text-align:center;font-size:12.5px;color:var(--ink-soft);margin-top:14px;}

  /* lightbox */
  .lightbox{display:none;position:fixed;inset:0;background:rgba(46,35,24,0.9);z-index:50;align-items:center;justify-content:center;padding:24px;cursor:zoom-out;}
  .lightbox.open{display:flex;}
  .lightbox img{max-width:100%;max-height:100%;border-radius:8px;}

  footer{border-top:1px solid var(--line);color:var(--ink-soft);font-size:12.5px;text-align:center;padding:28px 0;}

  @media (max-width:520px){ .hero h1{font-size:26px;} }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="index.html">
      <img src="logo.png" alt="うさぎブックス" style="height:38px;width:auto;">
    </a>
    <a class="back-link" href="index.html">← サイトTOPへ戻る</a>
  </div>
</nav>

<div class="wrap hero">
  <span class="tag">GOODS</span>
  <h1>本と、うさぎと、あなたの時間。</h1>
  <p>蔵書印やしおりから、トートバッグ、店内サインまで。うさぎブックスのある暮らしを、ものからも。</p>
</div>

<div class="wrap poster-wrap">
  <div class="poster-frame">
    <img src="goods.png" alt="うさぎブックス グッズ一覧" onclick="document.getElementById('lb').classList.add('open')">
  </div>
  <p class="hint">画像をタップすると拡大表示します</p>
</div>

<div class="lightbox" id="lb" onclick="this.classList.remove('open')">
  <img src="goods.png" alt="うさぎブックス グッズ一覧（拡大）">
</div>

<footer>うさぎブックス（グッズ・モックアップ）</footer>

</body>
</html>
